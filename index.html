<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DAI Activation — Vendor Tool</title>
<!--
  Vendor activation tool for the DAI suite (Automation / Advanced / Asset Intelligence).
  Paste a customer's activation request, set the entitlement, enter the application's
  secret key, and it produces an activation key (HMAC-SHA256) to send back. The app
  verifies with the same embedded key. Runs entirely in the browser; no key is stored.
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:#121416; color:#f2f4f7; line-height:1.45; }
  .wrap { max-width:760px; margin:0 auto; padding:18px 16px 60px; }
  h1 { font-size:22px; margin:8px 0 2px; }
  .sub { color:#9aa4ad; font-size:13px; margin-bottom:18px; }
  .card { background:#1a1d21; border:1px solid #2a2f35; border-radius:10px; padding:16px; margin:14px 0; }
  .card h2 { font-size:15px; margin:0 0 10px; color:#cbd5e1; }
  label { display:block; font-size:12px; color:#9aa4ad; margin:10px 0 4px; }
  textarea, input, select { width:100%; background:#0e1012; color:#f2f4f7; border:1px solid #2a2f35; border-radius:8px; padding:10px; font-size:14px; font-family:ui-monospace,Consolas,monospace; }
  textarea { resize:vertical; min-height:64px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:130px; }
  button { background:#2563eb; color:#fff; border:0; border-radius:8px; padding:11px 16px; font-size:14px; font-weight:600; cursor:pointer; margin-top:12px; }
  button.secondary { background:#2a2f35; }
  .out { white-space:pre-wrap; word-break:break-all; background:#0e1012; border:1px solid #2a2f35; border-radius:8px; padding:10px; font-family:ui-monospace,Consolas,monospace; font-size:13px; }
  .ok { color:#34d399; } .err { color:#f87171; } .muted { color:#9aa4ad; font-size:12px; }
  .pill { display:inline-block; background:#2a2f35; border-radius:999px; padding:2px 9px; font-size:12px; margin-right:6px; }
  #qrout { background:#fff; padding:12px; border-radius:8px; display:inline-block; margin-top:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>DAI Activation — Vendor Tool</h1>
  <div class="sub">Paste the customer's request, set the entitlement, enter the application's secret key, and send back the activation key. Runs entirely in your browser.</div>

  <div class="card">
    <h2>1 · Paste the customer's request</h2>
    <label>The <span class="muted">DAI-REQ-v1.…</span> code (from the QR they sent):</label>
    <textarea id="reqInput" placeholder="DAI-REQ-v1.…"></textarea>
    <button class="secondary" onclick="parseRequest()">Read request</button>
    <div id="reqInfo"></div>
  </div>

  <div class="card">
    <h2>2 · Set the entitlement</h2>
    <div class="row">
      <div>
        <label>Application</label>
        <select id="app">
          <option value="DAI">Automation Intelligence (DAI)</option>
          <option value="DAdI">Advanced Intelligence (DAdI)</option>
          <option value="DAsI">Asset Intelligence (DAsI)</option>
        </select>
      </div>
      <div>
        <label>Cameras (0–9)</label>
        <input id="cams" type="number" min="0" max="9" value="1" />
      </div>
      <div>
        <label>Expires</label>
        <input id="exp" type="date" />
      </div>
    </div>
  </div>

  <div class="card">
    <h2>3 · Secret key → generate</h2>
    <label>Secret key for the selected application. Never stored or sent.</label>
    <input id="key" type="text" placeholder="paste the application's secret key" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <button onclick="generate()">Generate activation key</button>
    <div id="genOut"></div>
    <div style="text-align:center;"><div id="qrout" style="display:none;"></div></div>
  </div>
</div>

<script>
function b64ToBytes(b64){ let s=(b64||'').replace(/\s+/g,'').replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; const bin=atob(s); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
function bytesToB64(a){ let s=''; for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]); return btoa(s); }
function bytesToB64url(a){ return bytesToB64(a).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function strToBytes(s){ return new TextEncoder().encode(s); }
function jsonToB64url(o){ return bytesToB64url(strToBytes(JSON.stringify(o))); }
function b64urlToJson(s){ return JSON.parse(new TextDecoder().decode(b64ToBytes(s))); }
function setHTML(id,html){ document.getElementById(id).innerHTML = html; }

async function hmacSha256(keyStr, msgStr){
  const k = await crypto.subtle.importKey('raw', strToBytes(keyStr), {name:'HMAC', hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', k, strToBytes(msgStr));
  return new Uint8Array(sig);
}

function parseRequest(){
  try{
    const raw = document.getElementById('reqInput').value;
    const marker = 'DAI-REQ-v1.';
    const idx = raw.indexOf(marker);
    if(idx < 0) throw new Error('No DAI-REQ-v1 request code found in what you pasted.');
    const req = b64urlToJson(raw.slice(idx + marker.length).trim());
    if(!req.fp) throw new Error('Request is missing the hardware fingerprint.');
    if(req.app) document.getElementById('app').value = req.app;
    setHTML('reqInfo',
      '<div style="margin-top:8px;"><span class="pill">app: '+(req.app||'pick below')+'</span>'+
      '<span class="pill">nonce: '+(req.nonce||'?')+'</span></div>'+
      '<label>Machine fingerprint</label><div class="out">'+req.fp+'</div>');
    window._req = req;
  }catch(e){ setHTML('reqInfo','<div class="err" style="margin-top:8px;">'+e.message+'</div>'); }
}

async function generate(){
  try{
    if(!window._req || !window._req.fp) throw new Error('Read a valid request first (step 1).');
    const keyStr = document.getElementById('key').value.trim();
    if(!keyStr) throw new Error('Enter the application secret key (step 3).');
    const cams = parseInt(document.getElementById('cams').value,10);
    if(isNaN(cams)||cams<0||cams>9) throw new Error('Cameras must be 0–9.');
    const expStr = document.getElementById('exp').value;
    if(!expStr) throw new Error('Set an expiration date.');
    const [y,m,d] = expStr.split('-').map(n=>parseInt(n,10));
    const tidBytes = new Uint8Array(8); crypto.getRandomValues(tidBytes);

    const payload = {
      v:1,
      app: document.getElementById('app').value,
      fp: window._req.fp,
      cams: cams,
      exp: [y,m,d],
      tid: bytesToB64url(tidBytes)
    };
    const payloadB64 = jsonToB64url(payload);
    const mac = await hmacSha256(keyStr, payloadB64);
    const code = 'DAI-ACT-v1.'+payloadB64+'.'+bytesToB64url(mac);

    setHTML('genOut',
      '<div class="ok" style="margin-top:10px;">Activation key — send this to the customer:</div>'+
      '<textarea id="actCode" readonly onclick="this.select()" style="margin-top:6px;min-height:80px;">'+code+'</textarea>'+
      '<button class="secondary" onclick="copyCode(this)">Copy code</button>');
    // QR is a convenience; if the QR library failed to load, the code above still stands.
    try{
      const qel = document.getElementById('qrout');
      qel.style.display='inline-block'; qel.innerHTML='';
      new QRCode(qel, { text: code, width: 240, height: 240, correctLevel: QRCode.CorrectLevel.M });
    }catch(_){ document.getElementById('qrout').style.display='none'; }
  }catch(e){ setHTML('genOut','<div class="err" style="margin-top:10px;">'+e.message+'</div>'); document.getElementById('qrout').style.display='none'; }
}

function copyCode(btn){
  const el = document.getElementById('actCode');
  if(!el) return;
  el.focus(); el.select(); el.setSelectionRange(0, el.value.length);
  const flash = ()=>{ const t=btn.textContent; btn.textContent='Copied!'; setTimeout(()=>{ btn.textContent=t; }, 1200); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(el.value).then(flash).catch(()=>{ try{ document.execCommand('copy'); flash(); }catch(_){} });
  } else {
    try{ document.execCommand('copy'); flash(); }catch(_){}
  }
}
</script>
</body>
</html>
